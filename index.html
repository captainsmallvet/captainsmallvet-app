    <script>
        const modelsToTry = ["gemini-pro-latest", "gemini-flash-latest", "gemini-3-pro-preview", "gemini-3-flash-preview", "gemini-2.5-flash", "gemini-1.5-flash"];

        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            const savedName = localStorage.getItem('gemini_user_name');
            
            if (savedKey && savedName) {
                document.getElementById('chat-section').classList.remove('hidden');
                document.getElementById('user-display').innerText = savedName;
                document.getElementById('welcome-msg').innerText = `สวัสดีครับคุณ${savedName} วันนี้มีอะไรให้ช่วยไหมครับ?`;
            } else {
                document.getElementById('setup-section').classList.remove('hidden');
            }
        };

        function toggleMenu() {
            document.getElementById('app-menu').classList.toggle('hidden');
        }

        function saveProfile() {
            const name = document.getElementById('user-name').value.trim();
            const key = document.getElementById('api-key').value.trim();
            
            if (name && key.startsWith('AIza')) {
                localStorage.setItem('gemini_user_name', name);
                localStorage.setItem('gemini_api_key', key);
                location.reload();
            } else { 
                alert("กรุณากรอกชื่อและรหัส API Key ให้ถูกต้องครับ"); 
            }
        }

        function clearKey() {
            if(confirm("ต้องการเปลี่ยนชื่อผู้ใช้หรือ API Key หรือไม่?")) {
                localStorage.removeItem('gemini_api_key');
                localStorage.removeItem('gemini_user_name');
                location.reload();
            }
        }

        async function sendToAI() {
            const inputField = document.getElementById('user-input');
            const prompt = inputField.value.trim();
            const apiKey = localStorage.getItem('gemini_api_key');
            const chatLog = document.getElementById('chat-log');
            const btn = document.getElementById('send-btn');
            const modelLabel = document.getElementById('model-display');

            if (!prompt) return;

            chatLog.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none max-w-[85%] shadow-sm text-sm">${prompt}</div></div>`;
            inputField.value = '';
            btn.disabled = true;
            btn.innerHTML = "...";

            let success = false;
            for (const modelName of modelsToTry) {
                if (success) break;
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        const aiText = data.candidates[0].content.parts[0].text;
                        chatLog.innerHTML += `<div class="flex justify-start"><div class="bg-white border text-gray-800 p-3 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm text-sm">${aiText}</div></div>`;
                        modelLabel.innerText = "Mode: " + modelName.toUpperCase();
                        modelLabel.style.color = "#fbbf24"; // สีทองให้เห็นชัด
                        success = true;
                    }
                } catch (e) {}
            }

            if (!success) {
                chatLog.innerHTML += `<div class="text-red-500 text-center text-xs">เกิดข้อผิดพลาดในการดึงข้อมูล</div>`;
            }

            btn.disabled = false;
            btn.innerHTML = "ส่ง";
            chatLog.scrollTop = chatLog.scrollHeight;
        }

// ฟังก์ชันส่ง Key ไปยังแอปใดก็ได้
function openApp(targetUrl) {
    const apiKey = localStorage.getItem('gemini_api_key');
    const userName = localStorage.getItem('gemini_user_name');
    
    // สร้าง URL ใหม่ที่มี Parameter ต่อท้าย
    const finalUrl = `${targetUrl}?key=${encodeURIComponent(apiKey)}&name=${encodeURIComponent(userName)}`;
    
    window.location.href = finalUrl;
}

// ฟังก์ชันเปิดลิ้งค์แบบไม่ส่ง Key
function openLink(targetLink) {
    window.location.href = targetLink;
}

function copyToClipboard(element) {
    // 1. ดึง URL จาก data-url ของปุ่มที่คลิก
    const url = element.getAttribute('data-url');
    const originalText = element.innerHTML;

    // 2. ใช้ Clipboard API เพื่อคัดลอก
    navigator.clipboard.writeText(url).then(() => {
        // 3. เปลี่ยนสไตล์และข้อความปุ่มเพื่อบอกสถานะ (Feedback)
        element.innerHTML = "คัดลอกลิ้งค์แล้ว!<br>วางที่ช่อง URL ได้เลย";
        element.style.backgroundColor = "#dcfce7"; // สีเขียวอ่อน
        element.style.color = "#166534"; // สีเขียวเข้ม
        element.style.borderColor = "#bbf7d0";

        // 4. แจ้งเตือนสั้นๆ (Optional)
        // alert("คัดลอกลิงก์แล้ว! กรุณาวางในช่องป้อน URL ของ Browser");

        // 5. คืนค่าปุ่มกลับเป็นเหมือนเดิมหลังจาก 3 วินาที
        setTimeout(() => {
            element.innerHTML = originalText;
            element.style.backgroundColor = ""; 
            element.style.color = "";
            element.style.borderColor = "";
        }, 3000);
        
    }).catch(err => {
        console.error('ไม่สามารถคัดลอกได้:', err);
        alert("เกิดข้อผิดพลาดในการคัดลอก กรุณาลองใหม่อีกครั้ง");
    });
}

    </script>
